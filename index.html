<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroma | Precision Matching</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #141417;
            --accent: #ffffff;
            --text-main: #e4e4e7;
            --text-muted: #71717a;
            --border: #27272a;
            --r-channel: #ef4444;
            --g-channel: #22c55e;
            --b-channel: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background-color: var(--bg); color: var(--text-main);
        }

        .container {
            background: var(--card); padding: 3.5rem; border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8); text-align: center;
            max-width: 440px; width: 90%; border: 1px solid var(--border);
        }

        h1 { font-size: 0.75rem; font-weight: 400; margin-bottom: 3rem; text-transform: uppercase; letter-spacing: 0.4em; color: var(--text-muted); }

        .game-setup, .game-area, .results { display: none; }
        .active { display: block; }

        .color-boxes {
            display: flex; gap: 1px; justify-content: center; margin: 0 0 3rem 0;
            background: var(--border); padding: 1px; border-radius: 4px; overflow: hidden;
        }

        .color-box-container { flex: 1; background: var(--card); }
        .color-box { width: 100%; aspect-ratio: 1.2/1; transition: background-color 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .color-box-label { display: block; padding: 10px 0; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.1em; }

        #spectrum-map {
            width: 100%; height: 180px; border: 1px solid var(--border);
            cursor: crosshair; border-radius: 2px; margin-bottom: 1rem; display: block;
        }

        .slider-group { margin-bottom: 2rem; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .label-r { color: var(--r-channel); }
        .label-g { color: var(--g-channel); }
        .label-b { color: var(--b-channel); }
        .slider-value { font-family: monospace; color: var(--text-main); }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 2px; background: var(--border); outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 2px; height: 16px; background: var(--accent); cursor: pointer; }

        #red-slider { background: linear-gradient(90deg, #1a0505, #ef444433); }
        #green-slider { background: linear-gradient(90deg, #051a0a, #22c55e33); }
        #blue-slider { background: linear-gradient(90deg, #050a1a, #3b82f633); }
        
        .mode-toggle { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 2rem; cursor: pointer; }
        .toggle-switch { width: 32px; height: 16px; background: var(--border); position: relative; }
        .toggle-switch::after { content: ''; position: absolute; width: 8px; height: 8px; background: var(--text-muted); top: 4px; left: 4px; transition: 0.2s; }
        #cheater-checkbox:checked + .toggle-switch { background: var(--text-muted); }
        #cheater-checkbox:checked + .toggle-switch::after { left: 20px; background: var(--accent); }
        #cheater-checkbox { display: none; }

        button { width: 100%; padding: 16px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; background: none; color: var(--text-main); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--text-main); color: var(--bg); }

        select { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); padding: 12px; width: 100%; font-size: 0.75rem; margin-bottom: 1rem; appearance: none; text-align: center; border-radius: 0; outline: none; }
        .timer { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 2rem; letter-spacing: 0.1em; }
        .match-percentage { font-size: 5rem; font-weight: 200; color: var(--text-main); margin: 1rem 0; letter-spacing: -0.05em; }
        .status-text { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin-bottom: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chroma</h1>
        
        <div class="game-setup active">
            <select id="timer-select">
                <option value="5">05 SECONDS</option>
                <option value="10" selected>10 SECONDS</option>
                <option value="20">20 SECONDS</option>
            </select>
            
            <label class="mode-toggle">
                <input type="checkbox" id="cheater-checkbox">
                <div class="toggle-switch"></div>
                <span class="color-box-label" style="margin:0">Assisted Spectrum</span>
            </label>

            <button onclick="startGame()">Begin Session</button>
        </div>

        <div class="game-area">
            <div class="timer" id="timer">00</div>
            <div class="color-boxes">
                <div class="color-box-container">
                    <div class="color-box" id="target-color"></div>
                    <span class="color-box-label">Reference</span>
                </div>
                <div class="color-box-container">
                    <div class="color-box" id="user-color"></div>
                    <span class="color-box-label">Output</span>
                </div>
            </div>

            <div class="controls">
                <div id="cheater-controls" style="display: none;">
                    <canvas id="spectrum-map"></canvas>
                    <p class="color-box-label" style="margin-bottom:2rem; opacity:0.5">Spectral Field Mapping</p>
                </div>
                
                <div id="standard-controls">
                    <div class="slider-group">
                        <div class="slider-header"><span class="label-r">Channel R</span><span class="slider-value" id="r-value">128</span></div>
                        <input type="range" id="red-slider" min="0" max="255" value="128" oninput="updateColor()">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header"><span class="label-g">Channel G</span><span class="slider-value" id="g-value">128</span></div>
                        <input type="range" id="green-slider" min="0" max="255" value="128" oninput="updateColor()">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header"><span class="label-b">Channel B</span><span class="slider-value" id="b-value">128</span></div>
                        <input type="range" id="blue-slider" min="0" max="255" value="128" oninput="updateColor()">
                    </div>
                </div>
            </div>
        </div>

        <div class="results">
            <div class="match-percentage" id="match-percentage">0%</div>
            <p class="status-text" id="status-text"></p>
            <button onclick="resetGame()">Retry</button>
        </div>
    </div>

    <script>
        let targetColor = { r: 0, g: 0, b: 0 };
        let currentRGB = { r: 128, g: 128, b: 128 };
        let timeLimit = 10;
        let isCheaterMode = false;
        let gameTimer;

        function drawSpectrum() {
            const canvas = document.getElementById('spectrum-map');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        
            for (let x = 0; x < canvas.width; x++) {
                const hue = (x / canvas.width) * 360;
                
                // Create a three-stop vertical gradient for every X-column
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                
                // TOP: Pure White (Saturation 0, Brightness 100)
                gradient.addColorStop(0, '#ffffff'); 
                
                // MIDDLE: The Pure Vibrant Color (Saturation 100, Brightness 100)
                gradient.addColorStop(0.5, `hsl(${hue}, 100%, 50%)`);
                
                // BOTTOM: Pure Black (Brightness 0)
                gradient.addColorStop(1, '#000000');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, 0, 1, canvas.height);
            }
        }

        function startGame() {
            isCheaterMode = document.getElementById('cheater-checkbox').checked;
            
            document.querySelector('.game-setup').classList.remove('active');
            document.querySelector('.game-area').classList.add('active');
            document.querySelector('.results').classList.remove('active');

            // Handle UI switching
            document.getElementById('standard-controls').style.display = isCheaterMode ? 'none' : 'block';
            document.getElementById('cheater-controls').style.display = isCheaterMode ? 'block' : 'none';

            if (isCheaterMode) {
                // Must draw AFTER the container is visible
                drawSpectrum(); 
            }

            targetColor = { 
                r: Math.floor(Math.random()*256), 
                g: Math.floor(Math.random()*256), 
                b: Math.floor(Math.random()*256) 
            };
            
            timeLimit = parseInt(document.getElementById('timer-select').value);
            document.getElementById('target-color').style.backgroundColor = `rgb(${targetColor.r},${targetColor.g},${targetColor.b})`;
            
            // Reset state
            currentRGB = { r: 128, g: 128, b: 128 };
            updateColor();
            startTimer();
        }

        function handleCanvasClick(e) {
            const canvas = document.getElementById('spectrum-map');
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor(e.clientX - rect.left);
            const y = Math.floor(e.clientY - rect.top);
            
            const ctx = canvas.getContext('2d');
            const data = ctx.getImageData(x, y, 1, 1).data;
            
            currentRGB = { r: data[0], g: data[1], b: data[2] };
            document.getElementById('user-color').style.backgroundColor = `rgb(${data[0]}, ${data[1]}, ${data[2]})`;
        }

        // Attach mouse events to the spectrum map
        const spectrumMap = document.getElementById('spectrum-map');
        spectrumMap.addEventListener('mousedown', handleCanvasClick);
        spectrumMap.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) handleCanvasClick(e);
        });

        function updateColor() {
            if (!isCheaterMode) {
                currentRGB.r = parseInt(document.getElementById('red-slider').value);
                currentRGB.g = parseInt(document.getElementById('green-slider').value);
                currentRGB.b = parseInt(document.getElementById('blue-slider').value);
                document.getElementById('r-value').textContent = currentRGB.r.toString().padStart(3, '0');
                document.getElementById('g-value').textContent = currentRGB.g.toString().padStart(3, '0');
                document.getElementById('b-value').textContent = currentRGB.b.toString().padStart(3, '0');
            }
            document.getElementById('user-color').style.backgroundColor = `rgb(${currentRGB.r},${currentRGB.g},${currentRGB.b})`;
        }

        function startTimer() {
            let remaining = timeLimit;
            document.getElementById('timer').textContent = remaining.toString().padStart(2, '0');
            if (gameTimer) clearInterval(gameTimer);
            
            gameTimer = setInterval(() => {
                remaining--;
                document.getElementById('timer').textContent = remaining.toString().padStart(2, '0');
                if (remaining <= 0) { 
                    clearInterval(gameTimer); 
                    endGame(); 
                }
            }, 1000);
        }

        function endGame() {
            const dr = targetColor.r - currentRGB.r;
            const dg = targetColor.g - currentRGB.g;
            const db = targetColor.b - currentRGB.b;
            
            const distance = Math.sqrt(2*dr*dr + 4*dg*dg + 3*db*db);
            const percentage = Math.max(0, Math.round((1 - distance / 765) * 100));
            
            document.querySelector('.game-area').classList.remove('active');
            document.querySelector('.results').classList.add('active');
            document.getElementById('match-percentage').textContent = percentage + '%';
            
            let status = percentage >= 98 ? 'Absolute Precision' : 
                         percentage >= 90 ? 'High Accuracy' : 
                         percentage >= 70 ? 'Standard Deviation' : 'Tolerance Failure';
            
            if (isCheaterMode) status += ' (Assisted)';
            document.getElementById('status-text').textContent = status;
        }

        function resetGame() {
            document.getElementById('red-slider').value = 128;
            document.getElementById('green-slider').value = 128;
            document.getElementById('blue-slider').value = 128;
            document.querySelector('.game-setup').classList.add('active');
            document.querySelector('.game-area').classList.remove('active');
            document.querySelector('.results').classList.remove('active');
        }
    </script>
</body>
</html>
